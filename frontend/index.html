<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div id="app" class="app-layout">

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          <span class="brand-name">AgentForge</span>
        </div>
        <button id="btn-new-chat" class="btn-new-chat" title="New Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>

      <div class="mode-selector">
        <span class="section-label">Mode</span>
        <div id="mode-list" class="mode-list"></div>
      </div>

      <div class="sessions-section">
        <span class="section-label">History</span>
        <div id="session-list" class="session-list"></div>
      </div>

      <div class="sidebar-footer">
        <button id="btn-settings" class="btn-icon-text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"></path></svg>
          Settings
        </button>
        <button id="btn-theme" class="btn-icon" title="Toggle theme">
          <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="chat-header">
        <div class="chat-header-left">
          <button id="btn-sidebar-toggle" class="btn-icon" title="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <h1 id="session-title" class="session-title">New Chat</h1>
          <button id="btn-rename" class="btn-icon" title="Rename session">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          </button>
        </div>
        <div class="chat-header-right">
          <div id="llm-status" class="llm-status" title="LLM connection status">
            <span class="status-dot"></span>
            <span id="llm-status-text">Checking...</span>
          </div>
          <button id="btn-export" class="btn-icon-text" title="Export conversation">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Export
          </button>
          <button id="btn-clear" class="btn-icon-text btn-danger" title="Clear chat">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
            Clear
          </button>
        </div>
      </header>

      <div id="chat-container" class="chat-container">
        <div id="welcome-screen" class="welcome-screen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          </div>
          <h2>AgentForge</h2>
          <p>A multi-agent AI platform powered by Microsoft AutoGen. Select a mode and start a conversation.</p>
          <div id="welcome-modes" class="welcome-modes"></div>
        </div>
        <div id="messages" class="messages"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="user-input"
            class="user-input"
            placeholder="Ask anything... (Ctrl+Enter to send)"
            rows="1"
            maxlength="8000"
          ></textarea>
          <div class="input-actions">
            <span id="char-count" class="char-count">0 / 8000</span>
            <button id="btn-send" class="btn-send" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </div>
        <div class="input-meta">
          <span id="active-mode-label" class="active-mode-label">Mode: Pair Coder</span>
          <span class="keyboard-hint">Ctrl+Enter to send &nbsp;·&nbsp; Shift+Enter for new line</span>
        </div>
      </div>
    </main>

    <div id="agent-panel" class="agent-panel">
      <div class="agent-panel-header">
        <span>Active Agents</span>
        <button id="btn-close-panel" class="btn-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="agent-list" class="agent-list"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" class="btn-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <section class="settings-section">
          <h3>LLM Backend</h3>
          <div class="form-group">
            <label for="s-base-url">Base URL</label>
            <input type="text" id="s-base-url" placeholder="http://localhost:1234/v1" />
          </div>
          <div class="form-group">
            <label for="s-api-key">API Key</label>
            <input type="password" id="s-api-key" placeholder="NULL (for local models)" />
          </div>
          <div class="form-group">
            <label for="s-model">Model Name</label>
            <input type="text" id="s-model" placeholder="local-model" />
          </div>
          <div class="form-group">
            <label for="s-temperature">Temperature <span id="s-temp-value" class="range-value">0.1</span></label>
            <input type="range" id="s-temperature" min="0" max="2" step="0.05" value="0.1" />
          </div>
          <div class="form-group">
            <label for="s-timeout">Timeout (seconds)</label>
            <input type="number" id="s-timeout" min="30" max="3600" value="600" />
          </div>
          <button id="btn-test-llm" class="btn-secondary">Test Connection</button>
          <span id="llm-test-result" class="test-result"></span>
        </section>
        <section class="settings-section">
          <h3>Appearance</h3>
          <div class="form-group">
            <label>Theme</label>
            <div class="radio-group">
              <label><input type="radio" name="theme" value="dark" checked /> Dark</label>
              <label><input type="radio" name="theme" value="light" /> Light</label>
            </div>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel-settings" class="btn-secondary">Cancel</button>
        <button id="btn-save-settings" class="btn-primary">Save Settings</button>
      </div>
    </div>
  </div>

  <div id="rename-modal" class="modal-overlay" style="display:none">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Rename Session</h2>
        <button id="btn-close-rename" class="btn-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="rename-input">Session Name</label>
          <input type="text" id="rename-input" maxlength="80" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel-rename" class="btn-secondary">Cancel</button>
        <button id="btn-confirm-rename" class="btn-primary">Rename</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/chat.js"></script>
  <script src="/assets/js/settings.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
