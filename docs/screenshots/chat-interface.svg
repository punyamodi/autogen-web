<text x="636" y="97" class="t" font-size="13" fill="#e6edf3">Write a Python function to sort a list of dicts</text>
<text x="636" y="115" class="t" font-size="13" fill="#e6edf3">by multiple keys</text>

<!-- CTO badge -->
<rect x="276" y="148" width="42" height="20" rx="4" fill="rgba(88,166,255,0.15)"/>
<text x="283" y="162" class="t" font-size="10" font-weight="700" fill="#58a6ff">CTO</text>

<!-- CTO message bubble -->
<rect x="276" y="172" width="500" height="76" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="294" y="196" class="t" font-size="13" fill="#e6edf3">Let me analyze this. We need sorted() with a tuple key that maps</text>
<text x="294" y="215" class="t" font-size="13" fill="#e6edf3">each dict to the requested key sequence. Type hints throughout.</text>
<text x="294" y="238" class="t" font-size="12" fill="#58a6ff">Executor, please implement with full type annotations.</text>

<!-- Executor badge -->
<rect x="276" y="268" width="65" height="20" rx="4" fill="rgba(63,185,80,0.15)"/>
<text x="283" y="282" class="t" font-size="10" font-weight="700" fill="#3fb950">Executor</text>

<!-- Executor message bubble -->
<rect x="276" y="292" width="728" height="282" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="294" y="316" class="t" font-size="13" fill="#e6edf3">Here's the implementation with full type hints:</text>

<!-- Code block -->
<rect x="294" y="330" width="694" height="228" rx="6" fill="#0d1117"/>

<!-- Code line 1 -->
<text y="355" class="m" font-size="12">
  <tspan x="314" fill="#79b8ff">from</tspan>
  <tspan fill="#e6edf3"> typing </tspan>
  <tspan fill="#79b8ff">import</tspan>
  <tspan fill="#e6edf3"> Any</tspan>
</text>

<!-- Code line 3 (blank skipped) -->
<text y="377" class="m" font-size="12">
  <tspan x="314" fill="#79b8ff">def</tspan>
  <tspan fill="#b392f0"> sort_dicts</tspan>
  <tspan fill="#e6edf3">(data: list[dict[str, Any]], keys: list[str])</tspan>
  <tspan fill="#79b8ff"> -></tspan>
  <tspan fill="#e6edf3"> list[dict[str, Any]]:</tspan>
</text>

<!-- Code line 4 -->
<text y="399" class="m" font-size="12">
  <tspan x="314" fill="#e6edf3">    </tspan>
  <tspan fill="#79b8ff">return</tspan>
  <tspan fill="#e6edf3"> sorted(data, key=</tspan>
  <tspan fill="#79b8ff">lambda</tspan>
  <tspan fill="#e6edf3"> x: tuple(</tspan>
</text>

<!-- Code line 5 -->
<text y="421" class="m" font-size="12">
  <tspan x="314" fill="#e6edf3">        x.get(k) </tspan>
  <tspan fill="#79b8ff">for</tspan>
  <tspan fill="#e6edf3"> k </tspan>
  <tspan fill="#79b8ff">in</tspan>
  <tspan fill="#e6edf3"> keys))</tspan>
</text>

<!-- Code line 7 (blank) -->
<!-- Code line 8 – comment -->
<text x="314" y="443" class="m" font-size="12" fill="#8b949e"># Sort by name, then by age</text>

<!-- Code line 9 -->
<text y="465" class="m" font-size="12">
  <tspan x="314" fill="#e6edf3">result = sort_dicts(people, keys=[</tspan>
  <tspan fill="#f8c555">"name"</tspan>
  <tspan fill="#e6edf3">, </tspan>
  <tspan fill="#f8c555">"age"</tspan>
  <tspan fill="#e6edf3">])</tspan>
</text>

<!-- Code line 10 -->
<text y="487" class="m" font-size="12">
  <tspan x="314" fill="#79b8ff">assert</tspan>
  <tspan fill="#e6edf3"> result[0][</tspan>
  <tspan fill="#f8c555">"name"</tspan>
  <tspan fill="#e6edf3">] == </tspan>
  <tspan fill="#f8c555">"Alice"</tspan>
</text>

<!-- Code line 11 -->
<text x="314" y="509" class="m" font-size="12" fill="#3fb950">TERMINATE</text>

