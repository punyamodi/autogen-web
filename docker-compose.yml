version: "3.9"

services:
  agentforge:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/workspace:/app/backend/workspace
      - agentforge_db:/app
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-NULL}
      - LLM_MODEL=${LLM_MODEL:-local-model}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-600}
    restart: unless-stopped

volumes:
  agentforge_db:
